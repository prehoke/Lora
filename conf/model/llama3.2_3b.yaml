name: llama3.2_3b
model_name: "meta-llama/Llama-3.2-3B"
use_hf_weights: True

# Model-specific configurations
pad_token_id: 128001  # Llama3.2 specific pad token ID

# Debugging configurations
output_attentions: True

# Lora configurations
apply_lora: True
lora:
  lora_freeze: False # lora head
  router_freeze: False # router
  sparsegen_init: "kaiming" # Options: "kaiming", "dense" (λ≈0, many adapters), "sparse" (λ≈1, few adapters), "zeros"
  r: 8
  lora_alpha: 16
  lora_dropout: 0.1
  lora_nums: 8
  bias: "none"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  modules_to_save: # If you want to train and save classifier or other modules
    - "score"
    # - "sparsegen"
    
  continuous_mole: true
  cmole_rank_k: 2
  cmole_router_hidden: 128
  cmole_use_lowrank: false
  cmole_diag_scale: 0.1
  cmole_lowrank_scale: 0.01

  sparsegen_cfg:
    enabled: False
    input_sizes: [3072,8192]
    hidden_sizes: 256
